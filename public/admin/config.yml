# Netlify CMS Configuration for GrowClimate Website
# This file defines what content can be edited in the CMS admin panel

backend:
  name: git-gateway
  branch: master

# Media storage (images uploaded in CMS go here)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Editorial workflow (draft/review/publish)
publish_mode: editorial_workflow

# ⚠️ IMPORTANT: Update this to your actual Netlify site URL after deployment!
site_url: https://your-site-name.netlify.app
display_url: https://your-site-name.netlify.app

# Collections = content sections in the CMS
collections:

  # ─────────────────────────────────────────────
  # Products — Dehumidifiers (Single JSON file)
  # ─────────────────────────────────────────────
  - name: "dehumidifiers"
    label: "Products — Dehumidifiers"
    label_singular: "Dehumidifier"
    file: "src/data/cms/products/dehumidifiers.json"
    extension: "json"
    format: "json"
    create: true
    fields:
      - label: Products
        name: products
        widget: list
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Model Number", name: "model", widget: "string" }
          - { label: "Series Name", name: "series", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Capacity", name: "capacity", widget: "string" }
          - { label: "Power", name: "power", widget: "string" }
          - { label: "Refrigerant", name: "refrigerant", widget: "string" }
          - { label: "Dimensions", name: "dimensions", widget: "string" }
          - { label: "Weight", name: "weight", widget: "string" }
          - { label: "Airflow", name: "airflow", widget: "string" }
          - { label: "Noise Level", name: "noise", widget: "string" }
          - { label: "Product Image URL", name: "image", widget: "string" }
          - { label: "Application Scenes", name: "scenes", widget: "list" }
          - { label: "Key Features", name: "features", widget: "list" }
          - { label: "Selling Points", name: "sellingPoints", widget: "text", required: false }
          - { label: "Datasheet URL", name: "datasheet", widget: "string", required: false }

  # ─────────────────────────────────────────────
  # Products — Humidifiers (Single JSON file)
  # ─────────────────────────────────────────────
  - name: "humidifiers"
    label: "Products — Humidifiers"
    label_singular: "Humidifier"
    file: "src/data/cms/products/humidifiers.json"
    extension: "json"
    format: "json"
    create: true
    fields:
      - label: Products
        name: products
        widget: list
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Model Number", name: "model", widget: "string" }
          - { label: "Series Name", name: "series", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Capacity", name: "capacity", widget: "string" }
          - { label: "Power", name: "power", widget: "string" }
          - { label: "Mist Type", name: "mistType", widget: "string" }
          - { label: "Dimensions", name: "dimensions", widget: "string" }
          - { label: "Weight", name: "weight", widget: "string" }
          - { label: "Coverage Area", name: "coverage", widget: "string" }
          - { label: "Noise Level", name: "noise", widget: "string" }
          - { label: "Product Image URL", name: "image", widget: "string" }
          - { label: "Application Scenes", name: "scenes", widget: "list" }
          - { label: "Key Features", name: "features", widget: "list" }
          - { label: "Selling Points", name: "sellingPoints", widget: "text", required: false }
          - { label: "Datasheet URL", name: "datasheet", widget: "string", required: false }

  # ─────────────────────────────────────────────
  # Products — Ventilation (Single JSON file)
  # ─────────────────────────────────────────────
  - name: "ventilation"
    label: "Products — Fans & Ventilation"
    label_singular: "Ventilation Product"
    file: "src/data/cms/products/ventilation.json"
    extension: "json"
    format: "json"
    create: true
    fields:
      - label: Products
        name: products
        widget: list
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Model Number", name: "model", widget: "string" }
          - { label: "Series Name", name: "series", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Cooling Capacity", name: "cooling", widget: "string" }
          - { label: "Power", name: "power", widget: "string" }
          - { label: "Refrigerant", name: "refrigerant", widget: "string" }
          - { label: "Dimensions", name: "dimensions", widget: "string" }
          - { label: "Weight", name: "weight", widget: "string" }
          - { label: "Airflow", name: "airflow", widget: "string" }
          - { label: "Noise Level", name: "noise", widget: "string" }
          - { label: "Product Image URL", name: "image", widget: "string" }
          - { label: "Application Scenes", name: "scenes", widget: "list" }
          - { label: "Key Features", name: "features", widget: "list" }
          - { label: "Selling Points", name: "sellingPoints", widget: "text", required: false }
          - { label: "Datasheet URL", name: "datasheet", widget: "string", required: false }

  # ─────────────────────────────────────────────
  # Company Info (Single JSON file)
  # ─────────────────────────────────────────────
  - name: "company"
    label: "Company Info"
    files:
      - name: "contact"
        label: "Contact Information"
        file: "src/data/cms/company/contact.json"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Company Name", name: "companyName", widget: "string" }
          - { label: "Business Hours", name: "businessHours", widget: "string" }
          - { label: "Facebook URL", name: "facebookUrl", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedinUrl", widget: "string", required: false }
      - name: "about"
        label: "About Page Content"
        file: "src/data/cms/company/about.json"
        fields:
          - { label: "About Hero Title", name: "heroTitle", widget: "string" }
          - { label: "About Hero Subtitle", name: "heroSubtitle", widget: "string" }
          - { label: "Story Paragraphs", name: "story", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "textarea" } }
          - { label: "Certifications", name: "certs", widget: "list" }
